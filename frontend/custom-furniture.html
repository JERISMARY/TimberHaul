<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Custom Furniture Quote - TimberHaul</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>

  <!-- Navigation -->
  <nav class="nav">
    <div class="nav-container">
      <a href="index.html" class="logo">TimberHaul</a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="custom-furniture.html" class="active">Custom Furniture</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </div>
      <div class="nav-actions">
        <a href="cart.html" style="position:relative"><i class="fa-solid fa-cart-shopping"></i><span class="badge" style="position:absolute;top:-8px;right:-12px" id="cart-count">0</span></a>
        <a href="profile.html"><i class="fa-regular fa-user"></i></a>
      </div>
    </div>
  </nav>

  <!-- Page Header -->
  <header class="page-header" style="background: linear-gradient(rgba(42,27,20,0.8), rgba(42,27,20,0.8)), url('https://images.unsplash.com/photo-1540932239986-30128078f3c5?auto=format&fit=crop&w=1920&q=80') center/cover;">
    <div class="header-content stagger-children">
      <h1>Custom Furniture</h1>
      <p>Design your dream furniture with our master craftsmen.</p>
    </div>
  </header>

  <main style="max-width: 800px; margin: 4rem auto; padding: 0 var(--space-xl);">
    <div class="glass-card" style="padding: var(--space-2xl);">
      <h2 style="font-family: var(--font-display); color: var(--c-oak); margin-bottom: 1rem;">Request a Quote</h2>
      <p style="color: var(--text-muted); margin-bottom: 2rem;">Fill out the details below and our artisans will get back to you with a custom quote.</p>

      <form id="custom-furniture-form" style="display: flex; flex-direction: column; gap: 1.5rem;">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
          <div class="form-group">
            <label>Full Name *</label>
            <input type="text" id="cf-name" required>
          </div>
          <div class="form-group">
            <label>Email Address *</label>
            <input type="email" id="cf-email" required>
          </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
          <div class="form-group">
            <label>Furniture Type *</label>
            <select id="cf-type" required>
              <option value="" disabled selected>Select Type</option>
              <option value="Dining Table">Dining Table</option>
              <option value="Bed">Bed</option>
              <option value="Sofa">Sofa</option>
              <option value="Cabinet">Cabinet</option>
              <option value="Office Desk">Office Desk</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="form-group">
            <label>Preferred Wood Type *</label>
            <select id="cf-wood" required>
              <option value="" disabled selected>Select Wood</option>
              <option value="Teak">Teak</option>
              <option value="Oak">Oak</option>
              <option value="Mahogany">Mahogany</option>
              <option value="Walnut">Walnut</option>
              <option value="Rosewood">Rosewood</option>
              <option value="Mango">Mango Wood</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label>Dimensions (Length x Width x Height in mm) *</label>
          <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem;">
            <input type="number" id="cf-length" placeholder="Length" required>
            <input type="number" id="cf-width" placeholder="Width" required>
            <input type="number" id="cf-height" placeholder="Height" required>
          </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
          <div class="form-group">
            <label>Finish Options</label>
            <input type="text" id="cf-finish" placeholder="e.g. Matte, Glossy, Natural Oil">
          </div>
          <div class="form-group">
            <label>Quantity</label>
            <input type="number" id="cf-quantity" value="1" min="1">
          </div>
        </div>

        <div class="form-group">
          <label>Additional Requirements & Details *</label>
          <textarea id="cf-details" rows="5" placeholder="Describe your vision..." required></textarea>
        </div>

        <button type="submit" class="btn btn-primary" id="cf-submit" style="margin-top: 1rem;">
          Submit Request
        </button>
      </form>
    </div>
  </main>

  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script>
    document.getElementById('custom-furniture-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('cf-submit');
      const originalText = btn.textContent;
      btn.textContent = 'Submitting...';
      btn.disabled = true;

      const payload = {
        guestName: document.getElementById('cf-name').value,
        guestEmail: document.getElementById('cf-email').value,
        furnitureType: document.getElementById('cf-type').value,
        woodType: document.getElementById('cf-wood').value,
        dimensions: {
          length: document.getElementById('cf-length').value,
          width: document.getElementById('cf-width').value,
          height: document.getElementById('cf-height').value,
          unit: 'mm'
        },
        finish: document.getElementById('cf-finish').value,
        quantity: document.getElementById('cf-quantity').value,
        additionalRequirements: document.getElementById('cf-details').value
      };

      try {
        await window.api.post('/api/custom-orders', payload);
        alert('Your custom furniture request has been successfully submitted! Our team will contact you shortly.');
        e.target.reset();
      } catch (err) {
        alert(err.message || 'Failed to submit request');
      } finally {
        btn.textContent = originalText;
        btn.disabled = false;
      }
    });

    // Pre-fill if logged in
    window.addEventListener('DOMContentLoaded', () => {
      const user = Auth.getUser();
      if (user) {
        document.getElementById('cf-name').value = user.name;
        document.getElementById('cf-email').value = user.email;
      }
    });
  </script>
</body>
</html>
