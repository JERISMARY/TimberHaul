<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <title>Admin Inventory — TimberHaul</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/animations.css">
  <link rel="stylesheet" href="../css/products.css">
</head>
<body data-sidebar="true">
  <div class="admin-layout">
    <main class="admin-main">
      <div class="admin-topbar">
        <h1 class="admin-page-title">Inventory Management</h1>
        <div class="admin-topbar-actions">
          <button class="btn btn-outline btn-sm"><i class="fa-solid fa-file-export"></i> Export</button>
        </div>
      </div>
      <div class="grid grid-3" style="gap:1.5rem; margin-bottom:2rem;">
        <div style="background:var(--bg-elevated);padding:1.5rem;border-radius:var(--radius-lg);border:1px solid var(--glass-border)">
          <div style="color:var(--text-muted);font-size:var(--fs-sm);text-transform:uppercase;letter-spacing:0.05em">Total Items</div>
          <div style="font-size:2rem;font-weight:700;color:var(--text-primary)">5,240</div>
        </div>
        <div style="background:var(--bg-elevated);padding:1.5rem;border-radius:var(--radius-lg);border:1px solid rgba(255,100,100,0.3)">
          <div style="color:var(--text-muted);font-size:var(--fs-sm);text-transform:uppercase;letter-spacing:0.05em">Low Stock Alerts</div>
          <div style="font-size:2rem;font-weight:700;color:#ff6b6b">12</div>
        </div>
        <div style="background:var(--bg-elevated);padding:1.5rem;border-radius:var(--radius-lg);border:1px solid var(--glass-border)">
          <div style="color:var(--text-muted);font-size:var(--fs-sm);text-transform:uppercase;letter-spacing:0.05em">Out of Stock</div>
          <div style="font-size:2rem;font-weight:700;color:var(--text-primary)">3</div>
        </div>
      </div>
      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead><tr><th>SKU</th><th>Product</th><th>In Stock</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody id="inv-list"><tr><td colspan="5" style="text-align:center">Loading...</td></tr></tbody>
        </table>
      </div>
    </main>
  </div>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="js/layout.js"></script>
  <script src="../js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      AdminLayout.init('nav-inventory');
      try {
        const res = await window.api.getAdminProducts();
        const products = res.products || res.data || [];
        document.getElementById('inv-list').innerHTML = products.map(p => `
          <tr>
            <td style="color:var(--text-muted)">${p.sku || p._id.substring(0,8).toUpperCase()}</td>
            <td style="font-weight:600">${p.name}</td>
            <td><strong>${p.stock}</strong></td>
            <td><span class="badge ${p.stock > 10 ? 'badge-success' : (p.stock > 0 ? 'badge-warning' : 'badge-danger')}">${p.stock > 10 ? 'In Stock' : (p.stock > 0 ? 'Low Stock' : 'Out of Stock')}</span></td>
            <td>
              <button class="btn btn-ghost btn-sm" onclick="alert('Update Stock')">Update Stock</button>
            </td>
          </tr>
        `).join('');
      } catch (err) {
        document.getElementById('inv-list').innerHTML = `<tr><td colspan="5">Error: ${err.message}</td></tr>`;
      }
    });
  </script>
</body>
</html>
