<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <title>Admin Messages — TimberHaul</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/animations.css">
  <link rel="stylesheet" href="../css/products.css">
</head>
<body data-sidebar="true">
  <div class="admin-layout">
    <main class="admin-main">
      <div class="admin-topbar">
        <h1 class="admin-page-title">Messages & Feedback</h1>
      </div>
      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead><tr><th>Name</th><th>Email</th><th>Subject</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead>
          <tbody id="msg-list"><tr><td colspan="6" style="text-align:center">Loading...</td></tr></tbody>
        </table>
      </div>
    </main>
  </div>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="js/layout.js"></script>
  <script src="../js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      AdminLayout.init('nav-messages');
      try {
        const res = await window.api.getMessages();
        const msgs = res.data || [];
        document.getElementById('msg-list').innerHTML = msgs.map(m => `
          <tr>
            <td style="font-weight:600">${m.name}</td>
            <td>${m.email}</td>
            <td>${m.subject}</td>
            <td><span class="badge ${m.status === 'replied' ? 'badge-success' : 'badge-warning'}">${m.status}</span></td>
            <td>${new Date(m.createdAt).toLocaleDateString()}</td>
            <td>
              <button class="btn btn-ghost btn-sm" onclick="alert('View/Reply Message')">View</button>
            </td>
          </tr>
        `).join('');
      } catch (err) {
        document.getElementById('msg-list').innerHTML = `<tr><td colspan="6">Error: ${err.message}</td></tr>`;
      }
    });
  </script>
</body>
</html>
