<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <title>Admin Customers — TimberHaul</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/animations.css">
  <link rel="stylesheet" href="../css/products.css">
</head>
<body data-sidebar="true">
  <div class="admin-layout">
    <main class="admin-main">
      <div class="admin-topbar">
        <h1 class="admin-page-title">Customers</h1>
      </div>
      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Joined</th><th>Actions</th></tr></thead>
          <tbody id="user-list"><tr><td colspan="5" style="text-align:center">Loading...</td></tr></tbody>
        </table>
      </div>
    </main>
  </div>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="js/layout.js"></script>
  <script src="../js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      AdminLayout.init('nav-customers');
      try {
        const res = await window.api.getCustomers();
        const users = res.data || [];
        document.getElementById('user-list').innerHTML = users.map(u => `
          <tr>
            <td style="font-weight:600">${u.name}</td>
            <td>${u.email}</td>
            <td><span class="badge ${u.role === 'admin' ? 'badge-primary' : 'badge-info'}">${u.role}</span></td>
            <td>${new Date(u.createdAt).toLocaleDateString()}</td>
            <td>
              <button class="btn btn-ghost btn-sm">View Details</button>
            </td>
          </tr>
        `).join('');
      } catch (err) {
        document.getElementById('user-list').innerHTML = `<tr><td colspan="5">Error: ${err.message}</td></tr>`;
      }
    });
  </script>
</body>
</html>
