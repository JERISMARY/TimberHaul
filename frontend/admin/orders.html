<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <title>Admin Orders — TimberHaul</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/animations.css">
  <link rel="stylesheet" href="../css/products.css">
  <style>:root { --sidebar-w: 256px; }</style>
</head>
<body data-sidebar="true">
  <!-- Sidebar injected by layout.js -->
  <div class="admin-layout">
    <main class="admin-main">
      <div class="admin-topbar">
        <h1 class="admin-page-title">Orders Management</h1>
      </div>
      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead><tr><th>Order ID</th><th>Customer</th><th>Amount</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead>
          <tbody id="order-list"><tr><td colspan="6" style="text-align:center">Loading...</td></tr></tbody>
        </table>
      </div>
    </main>
  </div>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="js/layout.js"></script>
  <script src="../js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      AdminLayout.init('nav-orders');
      try {
        const res = await window.api.getAdminOrders();
        const orders = res.orders || res.data || [];
        document.getElementById('order-list').innerHTML = orders.map(o => `
          <tr>
            <td style="font-weight:700;color:var(--c-teak)">${o._id.substring(0,12)}</td>
            <td>${o.user ? o.user.name : 'Guest'}</td>
            <td>₹${o.totalPrice.toLocaleString('en-IN')}</td>
            <td><span class="badge badge-info">${o.status}</span></td>
            <td>${new Date(o.createdAt).toLocaleDateString()}</td>
            <td><button class="btn btn-ghost btn-sm">Update</button></td>
          </tr>
        `).join('');
      } catch (err) {
        document.getElementById('order-list').innerHTML = `<tr><td colspan="6">Error loading: ${err.message}</td></tr>`;
      }
    });
  </script>
</body>
</html>
