<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <title>Admin Settings — TimberHaul</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/animations.css">
  <link rel="stylesheet" href="../css/products.css">
</head>
<body data-sidebar="true">
  <div class="admin-layout">
    <main class="admin-main">
      <div class="admin-topbar">
        <h1 class="admin-page-title">Store Settings</h1>
        <button class="btn btn-primary" onclick="alert('Saved successfully!')"><i class="fa-solid fa-save"></i> Save Settings</button>
      </div>
      
      <div class="grid grid-2" style="gap:2rem">
        <div style="background:var(--bg-elevated);padding:2rem;border-radius:var(--radius-lg);border:1px solid var(--glass-border)">
          <h3 style="margin-bottom:1.5rem;font-family:var(--font-display);color:var(--text-primary)">General Setup</h3>
          <div style="margin-bottom:1rem">
            <label style="display:block;margin-bottom:0.5rem;color:var(--text-muted);font-size:0.85rem">Store Name</label>
            <input type="text" value="TimberHaul" style="width:100%;padding:0.75rem;border-radius:4px;border:1px solid var(--border-subtle);background:var(--bg-surface);color:white">
          </div>
          <div style="margin-bottom:1rem">
            <label style="display:block;margin-bottom:0.5rem;color:var(--text-muted);font-size:0.85rem">Contact Email</label>
            <input type="email" value="support@timberhaul.com" style="width:100%;padding:0.75rem;border-radius:4px;border:1px solid var(--border-subtle);background:var(--bg-surface);color:white">
          </div>
          <div style="margin-bottom:1rem">
            <label style="display:block;margin-bottom:0.5rem;color:var(--text-muted);font-size:0.85rem">Tax Rate (%)</label>
            <input type="number" value="18" style="width:100%;padding:0.75rem;border-radius:4px;border:1px solid var(--border-subtle);background:var(--bg-surface);color:white">
          </div>
        </div>
        
        <div style="background:var(--bg-elevated);padding:2rem;border-radius:var(--radius-lg);border:1px solid var(--glass-border)">
          <h3 style="margin-bottom:1.5rem;font-family:var(--font-display);color:var(--text-primary)">API Keys</h3>
          <div style="margin-bottom:1rem">
            <label style="display:block;margin-bottom:0.5rem;color:var(--text-muted);font-size:0.85rem">Cloudinary Cloud Name</label>
            <input type="text" placeholder="e.g., dxv... " style="width:100%;padding:0.75rem;border-radius:4px;border:1px solid var(--border-subtle);background:var(--bg-surface);color:white">
          </div>
          <div style="margin-bottom:1rem">
            <label style="display:block;margin-bottom:0.5rem;color:var(--text-muted);font-size:0.85rem">SMTP Host</label>
            <input type="text" placeholder="smtp.gmail.com" style="width:100%;padding:0.75rem;border-radius:4px;border:1px solid var(--border-subtle);background:var(--bg-surface);color:white">
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="js/layout.js"></script>
  <script src="../js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      AdminLayout.init('nav-settings');
    });
  </script>
</body>
</html>
