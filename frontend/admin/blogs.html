<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <title>Admin Blogs — TimberHaul</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/animations.css">
  <link rel="stylesheet" href="../css/products.css">
</head>
<body data-sidebar="true">
  <div class="admin-layout">
    <main class="admin-main">
      <div class="admin-topbar">
        <div>
          <h1 class="admin-page-title">Blog Posts</h1>
        </div>
        <div class="admin-topbar-actions">
          <button class="btn btn-primary" onclick="alert('Rich Text Editor integration coming soon!')">
            <i class="fa-solid fa-pen"></i> Write Post
          </button>
        </div>
      </div>
      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead><tr><th>Image</th><th>Title</th><th>Author</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead>
          <tbody id="blog-list"><tr><td colspan="6" style="text-align:center">Loading...</td></tr></tbody>
        </table>
      </div>
    </main>
  </div>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="js/layout.js"></script>
  <script src="../js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      AdminLayout.init('nav-blogs');
      try {
        const res = await window.api.get('/blogs'); // Mock API support
        const blogs = res.blogs || res.data || [];
        document.getElementById('blog-list').innerHTML = blogs.map(b => `
          <tr>
            <td><img src="${b.image}" style="width:60px;height:40px;border-radius:4px;object-fit:cover"></td>
            <td style="font-weight:600">${b.title}</td>
            <td>${b.author ? b.author.name : 'Admin'}</td>
            <td><span class="badge ${b.isPublished ? 'badge-success' : 'badge-warning'}">${b.isPublished ? 'Published' : 'Draft'}</span></td>
            <td>${new Date(b.createdAt).toLocaleDateString()}</td>
            <td>
              <button class="btn btn-ghost btn-sm" onclick="alert('Edit Blog')"><i class="fa-solid fa-pen"></i></button>
            </td>
          </tr>
        `).join('');
      } catch (err) {
        document.getElementById('blog-list').innerHTML = `<tr><td colspan="6">Error: ${err.message}</td></tr>`;
      }
    });
  </script>
</body>
</html>
