<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <title>Admin Analytics — TimberHaul</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/animations.css">
  <link rel="stylesheet" href="../css/products.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body data-sidebar="true">
  <div class="admin-layout">
    <main class="admin-main">
      <div class="admin-topbar">
        <h1 class="admin-page-title">Advanced Analytics</h1>
      </div>
      <div class="grid grid-2" style="gap:2rem;margin-bottom:2rem;">
        <div style="background:var(--bg-elevated);padding:2rem;border-radius:var(--radius-lg);border:1px solid var(--glass-border)">
          <h3 style="margin-bottom:1rem;color:var(--text-primary)">Sales Over Time</h3>
          <canvas id="salesChart" height="250"></canvas>
        </div>
        <div style="background:var(--bg-elevated);padding:2rem;border-radius:var(--radius-lg);border:1px solid var(--glass-border)">
          <h3 style="margin-bottom:1rem;color:var(--text-primary)">Revenue by Category</h3>
          <canvas id="categoryChart" height="250"></canvas>
        </div>
      </div>
    </main>
  </div>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="js/layout.js"></script>
  <script src="../js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      AdminLayout.init('nav-analytics');
      
      // Setup Charts (using dummy data if API fails)
      const ctxSales = document.getElementById('salesChart').getContext('2d');
      new Chart(ctxSales, {
        type: 'line',
        data: {
          labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
          datasets: [{
            label: 'Sales (₹)',
            data: [12000, 19000, 15000, 22000, 18000, 25000, 28000],
            borderColor: '#D4A843',
            backgroundColor: 'rgba(212, 168, 67, 0.1)',
            fill: true,
            tension: 0.4
          }]
        },
        options: { responsive: true, plugins: { legend: { display: false } } }
      });

      const ctxCat = document.getElementById('categoryChart').getContext('2d');
      new Chart(ctxCat, {
        type: 'doughnut',
        data: {
          labels: ['Solid Wood', 'Plywood', 'Doors', 'Furniture'],
          datasets: [{
            data: [45, 25, 20, 10],
            backgroundColor: ['#7B5B30', '#D4A843', '#2C1A0E', '#4A1528'],
            borderWidth: 0
          }]
        },
        options: { responsive: true, maintainAspectRatio: false }
      });
    });
  </script>
</body>
</html>
