<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compare Products - TimberHaul</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    .compare-table { width: 100%; border-collapse: collapse; margin-top: 2rem; background: var(--bg-surface); border-radius: var(--radius-lg); overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
    .compare-table th, .compare-table td { padding: 1.5rem; text-align: center; border-bottom: 1px solid var(--border-subtle); border-right: 1px solid var(--border-subtle); }
    .compare-table th { background: var(--bg-surface-2); font-weight: 600; text-align: left; min-width: 200px; }
    .compare-table tr:last-child td, .compare-table tr:last-child th { border-bottom: none; }
    .compare-table td:last-child, .compare-table th:last-child { border-right: none; }
    .compare-img { width: 150px; height: 150px; object-fit: cover; border-radius: var(--radius-md); margin-bottom: 1rem; }
    .remove-compare-btn { color: var(--c-error); background: transparent; border: none; cursor: pointer; font-size: 0.9rem; margin-top: 1rem; }
    .remove-compare-btn:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <nav class="nav">
    <div class="nav-container">
      <a href="index.html" class="logo">TimberHaul</a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="custom-furniture.html">Custom Furniture</a>
      </div>
      <div class="nav-actions">
        <a href="cart.html"><i class="fa-solid fa-cart-shopping"></i></a>
        <a href="profile.html"><i class="fa-regular fa-user"></i></a>
      </div>
    </div>
  </nav>

  <main style="max-width: 1200px; margin: 6rem auto; padding: 0 var(--space-xl);">
    <h1 style="font-family: var(--font-display); color: var(--c-oak); margin-bottom: 0.5rem;">Compare Products</h1>
    <p style="color: var(--text-muted);">Evaluate specifications side-by-side to make the perfect choice.</p>

    <div style="overflow-x: auto; padding-bottom: 2rem;">
      <table class="compare-table" id="compare-table" style="display:none;">
        <thead>
          <tr id="row-product-header">
            <th>Product</th>
          </tr>
        </thead>
        <tbody>
          <tr id="row-price">
            <th>Price</th>
          </tr>
          <tr id="row-wood">
            <th>Wood Type</th>
          </tr>
          <tr id="row-dim">
            <th>Dimensions</th>
          </tr>
          <tr id="row-warranty">
            <th>Warranty</th>
          </tr>
          <tr id="row-finish">
            <th>Finish Options</th>
          </tr>
          <tr id="row-action">
            <th>Action</th>
          </tr>
        </tbody>
      </table>
      
      <div id="empty-state" style="text-align:center; padding: 4rem 2rem; background: var(--bg-surface); border-radius: var(--radius-lg); margin-top: 2rem;">
        <i class="fa-solid fa-code-compare" style="font-size: 3rem; color: var(--border-subtle); margin-bottom: 1rem;"></i>
        <h3>Nothing to compare yet</h3>
        <p style="color: var(--text-muted); margin-bottom: 1.5rem;">Add some products from the catalog to see them side-by-side.</p>
        <a href="products.html" class="btn btn-primary">Browse Products</a>
      </div>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/cart.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      renderCompare();
    });

    function getCompareList() {
      try { return JSON.parse(localStorage.getItem('th_compare')) || []; }
      catch(e) { return []; }
    }

    function removeCompare(id) {
      let list = getCompareList();
      list = list.filter(p => p._id !== id);
      localStorage.setItem('th_compare', JSON.stringify(list));
      renderCompare();
    }

    function renderCompare() {
      const list = getCompareList();
      const table = document.getElementById('compare-table');
      const empty = document.getElementById('empty-state');

      if (list.length === 0) {
        table.style.display = 'none';
        empty.style.display = 'block';
        return;
      }

      table.style.display = 'table';
      empty.style.display = 'none';

      const hRow = document.getElementById('row-product-header');
      const pRow = document.getElementById('row-price');
      const wRow = document.getElementById('row-wood');
      const dRow = document.getElementById('row-dim');
      const wrRow = document.getElementById('row-warranty');
      const fRow = document.getElementById('row-finish');
      const aRow = document.getElementById('row-action');

      // Reset rows to just the TH
      hRow.innerHTML = '<th>Product</th>';
      pRow.innerHTML = '<th>Price</th>';
      wRow.innerHTML = '<th>Wood Type</th>';
      dRow.innerHTML = '<th>Dimensions</th>';
      wrRow.innerHTML = '<th>Warranty</th>';
      fRow.innerHTML = '<th>Finish Options</th>';
      aRow.innerHTML = '<th>Action</th>';

      list.forEach(p => {
        const imgUrl = (p.images && p.images[0]) ? p.images[0].url : 'https://placehold.co/400x300?text=No+Image';
        const price = p.finalPrice || p.price;
        const dim = p.dimensions ? `${p.dimensions.length}x${p.dimensions.width}x${p.dimensions.thickness} ${p.dimensions.unit}` : 'N/A';
        const finish = (p.finishOptions && p.finishOptions.length) ? p.finishOptions.join(', ') : 'Standard';
        
        hRow.innerHTML += `
          <td>
            <img src="${imgUrl}" class="compare-img">
            <h3 style="font-size:1.1rem;margin-bottom:0.5rem"><a href="product-detail.html?id=${p._id}" style="color:var(--text-primary);text-decoration:none;">${p.name}</a></h3>
            <button class="remove-compare-btn" onclick="removeCompare('${p._id}')"><i class="fa-solid fa-trash"></i> Remove</button>
          </td>
        `;
        pRow.innerHTML += `<td style="font-weight:600;color:var(--c-teak)">₹${price.toLocaleString('en-IN')}</td>`;
        wRow.innerHTML += `<td>${p.woodType || 'N/A'}</td>`;
        dRow.innerHTML += `<td>${dim}</td>`;
        wrRow.innerHTML += `<td>${p.warranty || '1 Year Standard'}</td>`;
        fRow.innerHTML += `<td>${finish}</td>`;
        
        const pJson = JSON.stringify(p).replace(/"/g, '&quot;');
        aRow.innerHTML += `
          <td>
            <button class="btn btn-primary btn-sm" onclick="addToCartLocal(${pJson})">Add to Cart</button>
          </td>
        `;
      });
    }
  </script>
</body>
</html>
