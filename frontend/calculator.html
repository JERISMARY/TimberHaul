<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timber CFT Calculator - TimberHaul</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    .calc-container { max-width: 900px; margin: 4rem auto; padding: 2rem; background: var(--bg-surface); border-radius: var(--radius-xl); box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid var(--border-subtle); display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; }
    .calc-result-box { background: var(--bg-surface-2); padding: 2rem; border-radius: var(--radius-lg); text-align: center; border: 1px solid var(--border-subtle); }
    .calc-result-val { font-family: var(--font-display); font-size: 3rem; color: var(--c-oak); margin: 1rem 0; }
    
    @media (max-width: 768px) {
      .calc-container { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <div class="nav-container">
      <a href="index.html" class="logo">TimberHaul</a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="calculator.html" class="active">Calculator</a>
      </div>
    </div>
  </nav>

  <main style="padding-top: 60px;">
    <div style="text-align:center; max-width: 600px; margin: 3rem auto 1rem;">
      <h1 style="font-family: var(--font-display); color: var(--text-primary);">Timber Volume Calculator</h1>
      <p style="color: var(--text-muted);">Quickly calculate the Cubic Feet (CFT) and Cubic Meters (CBM) for your raw timber or lumber orders.</p>
    </div>

    <div class="calc-container">
      <!-- Inputs -->
      <div>
        <h3 style="margin-bottom: 1.5rem; color: var(--c-teak);">Enter Dimensions</h3>
        <div class="form-group">
          <label>Unit of Measurement</label>
          <select id="calc-unit" class="form-input">
            <option value="inches">Inches (in)</option>
            <option value="mm">Millimeters (mm)</option>
            <option value="cm">Centimeters (cm)</option>
          </select>
        </div>
        <div class="form-group">
          <label>Length</label>
          <input type="number" id="calc-l" class="form-input" placeholder="e.g. 96" value="96" oninput="calculateVolume()">
        </div>
        <div class="form-group">
          <label>Width</label>
          <input type="number" id="calc-w" class="form-input" placeholder="e.g. 12" value="12" oninput="calculateVolume()">
        </div>
        <div class="form-group">
          <label>Thickness</label>
          <input type="number" id="calc-t" class="form-input" placeholder="e.g. 2" value="2" oninput="calculateVolume()">
        </div>
        <div class="form-group">
          <label>Quantity (Pieces)</label>
          <input type="number" id="calc-q" class="form-input" value="1" min="1" oninput="calculateVolume()">
        </div>
      </div>

      <!-- Results -->
      <div style="display:flex; flex-direction:column; gap: 1.5rem;">
        <div class="calc-result-box">
          <h3 style="color:var(--text-secondary);">Total Volume (CFT)</h3>
          <div class="calc-result-val" id="res-cft">0.00</div>
          <p style="font-size:var(--fs-sm); color:var(--text-muted);">Cubic Feet</p>
        </div>
        <div class="calc-result-box">
          <h3 style="color:var(--text-secondary);">Total Volume (CBM)</h3>
          <div class="calc-result-val" id="res-cbm" style="font-size:2rem; color:var(--text-primary);">0.000</div>
          <p style="font-size:var(--fs-sm); color:var(--text-muted);">Cubic Meters</p>
        </div>
        
        <div style="margin-top:auto;">
          <a href="products.html" class="btn btn-primary w-full ripple-container">Browse Timber Catalog</a>
        </div>
      </div>
    </div>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', calculateVolume);
    document.getElementById('calc-unit').addEventListener('change', calculateVolume);

    function calculateVolume() {
      const l = parseFloat(document.getElementById('calc-l').value) || 0;
      const w = parseFloat(document.getElementById('calc-w').value) || 0;
      const t = parseFloat(document.getElementById('calc-t').value) || 0;
      const q = parseInt(document.getElementById('calc-q').value) || 1;
      const unit = document.getElementById('calc-unit').value;

      let l_inch = l, w_inch = w, t_inch = t;

      // Convert everything to inches first for standard CFT calculation
      if (unit === 'mm') {
        l_inch = l / 25.4; w_inch = w / 25.4; t_inch = t / 25.4;
      } else if (unit === 'cm') {
        l_inch = l / 2.54; w_inch = w / 2.54; t_inch = t / 2.54;
      }

      // Formula for CFT = (Length in inches × Width in inches × Thickness in inches) / 144
      const volumeOnePieceCFT = (l_inch * w_inch * t_inch) / 144;
      const totalCFT = volumeOnePieceCFT * q;

      // 1 CFT = 0.0283168 CBM
      const totalCBM = totalCFT * 0.0283168;

      document.getElementById('res-cft').innerText = totalCFT.toFixed(2);
      document.getElementById('res-cbm').innerText = totalCBM.toFixed(3);
    }
  </script>
</body>
</html>
