<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reset Password — TimberHaul</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/animations.css">
  <style>
    .auth-page { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:2rem; background:url('https://images.unsplash.com/photo-1558618666-fcd25c85cd64?auto=format&fit=crop&w=2000&q=80') center/cover; position:relative; }
    .auth-page::before { content:''; position:absolute; inset:0; background:rgba(20,15,10,0.8); backdrop-filter:blur(8px); }
    .auth-box { position:relative; z-index:1; background:var(--bg-elevated); border:1px solid var(--glass-border); padding:3rem; border-radius:var(--radius-xl); width:min(400px, 100%); text-align:center; box-shadow:var(--shadow-lg); }
    .auth-logo { font-size:2rem; margin-bottom:1rem; }
    .auth-title { font-family:var(--font-display); font-size:1.5rem; font-weight:700; color:var(--text-primary); margin-bottom:0.5rem; }
    .auth-sub { font-size:0.9rem; color:var(--text-muted); margin-bottom:2rem; }
    .form-group { text-align:left; margin-bottom:1.5rem; }
    .form-label { display:block; font-size:0.85rem; font-weight:600; color:var(--text-muted); margin-bottom:0.4rem; }
    .form-input { width:100%; padding:0.8rem 1rem; border:1px solid var(--border-subtle); background:var(--bg-surface); border-radius:var(--radius-md); color:var(--text-primary); }
    .form-input:focus { border-color:var(--c-teak); outline:none; }
  </style>
</head>
<body data-theme="dark">
  <div class="auth-page fade-in-up">
    <div class="auth-box">
      <div class="auth-logo">🪵</div>
      <h1 class="auth-title">Reset Password</h1>
      <p class="auth-sub">Enter your new password below.</p>
      <form id="reset-form">
        <div class="form-group">
          <label class="form-label">New Password</label>
          <input type="password" class="form-input" id="password" required placeholder="Minimum 6 characters">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%">Update Password</button>
      </form>
    </div>
  </div>
  
  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
  <script>
    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');
      if (!token) {
        showToast('Invalid or missing reset token', 'error');
        return;
      }
      
      const password = document.getElementById('password').value;
      const btn = e.target.querySelector('button');
      btn.disabled = true;
      btn.textContent = 'Updating...';
      try {
        const res = await fetch(`/api/auth/resetpassword/${token}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });
        const data = await res.json();
        if (data.success) {
          showToast('Password reset successfully! Redirecting...', 'success');
          setTimeout(() => window.location.href = 'login.html', 2000);
        } else {
          showToast(data.message || 'Error resetting password', 'error');
        }
      } catch (err) {
        showToast('Network error', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Update Password';
      }
    });
  </script>
</body>
</html>
