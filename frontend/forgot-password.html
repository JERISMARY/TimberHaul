<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Forgot Password — TimberHaul</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/animations.css">
  <style>
    .auth-page { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:2rem; background:url('https://images.unsplash.com/photo-1558618666-fcd25c85cd64?auto=format&fit=crop&w=2000&q=80') center/cover; position:relative; }
    .auth-page::before { content:''; position:absolute; inset:0; background:rgba(20,15,10,0.8); backdrop-filter:blur(8px); }
    .auth-box { position:relative; z-index:1; background:var(--bg-elevated); border:1px solid var(--glass-border); padding:3rem; border-radius:var(--radius-xl); width:min(400px, 100%); text-align:center; box-shadow:var(--shadow-lg); }
    .auth-logo { font-size:2rem; margin-bottom:1rem; }
    .auth-title { font-family:var(--font-display); font-size:1.5rem; font-weight:700; color:var(--text-primary); margin-bottom:0.5rem; }
    .auth-sub { font-size:0.9rem; color:var(--text-muted); margin-bottom:2rem; }
    .form-group { text-align:left; margin-bottom:1.5rem; }
    .form-label { display:block; font-size:0.85rem; font-weight:600; color:var(--text-muted); margin-bottom:0.4rem; }
    .form-input { width:100%; padding:0.8rem 1rem; border:1px solid var(--border-subtle); background:var(--bg-surface); border-radius:var(--radius-md); color:var(--text-primary); }
    .form-input:focus { border-color:var(--c-teak); outline:none; }
  </style>
</head>
<body data-theme="dark">
  <div class="auth-page fade-in-up">
    <div class="auth-box">
      <div class="auth-logo">🪵</div>
      <h1 class="auth-title">Forgot Password</h1>
      <p class="auth-sub">Enter your email address to receive a reset link.</p>
      <form id="forgot-form">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-input" id="email" required placeholder="name@example.com">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%">Send Reset Link</button>
      </form>
      <div style="margin-top:1.5rem;font-size:0.85rem">
        <a href="login.html" style="color:var(--c-teak);text-decoration:none">Back to Login</a>
      </div>
    </div>
  </div>
  
  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
  <script>
    document.getElementById('forgot-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const btn = e.target.querySelector('button');
      btn.disabled = true;
      btn.textContent = 'Sending...';
      try {
        const res = await fetch(`${window.api.baseUrl}/auth/forgotpassword`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await res.json();
        if (data.success) {
          showToast('Reset link sent to your email', 'success');
        } else {
          showToast(data.message || 'Error sending link', 'error');
        }
      } catch (err) {
        showToast('Network error', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Send Reset Link';
      }
    });
  </script>
</body>
</html>
