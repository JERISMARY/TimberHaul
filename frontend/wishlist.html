<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wishlist — TimberHaul</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/products.css">
  <style>body{opacity:0} body.loaded{opacity:1;transition:opacity 0.4s}</style>
</head>
<body>
  <div class="cursor-dot" id="cursor-dot"></div>
  <div class="cursor-ring" id="cursor-ring"></div>

  <nav id="navbar">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">
        <div class="nav-logo-icon">🪵</div>
        <span class="nav-logo-text">Timber<span>Haul</span></span>
      </a>
      <div class="nav-links">
        <a href="index.html" class="nav-link">Home</a>
        <a href="products.html" class="nav-link">Products</a>
        <a href="blog.html" class="nav-link">Blog</a>
      </div>
      <div class="nav-actions">
        <button class="nav-action-btn" data-href="wishlist.html" style="color:var(--c-teak)"><i class="fa-solid fa-heart"></i></button>
        <button class="nav-action-btn" data-href="cart.html"><i class="fa-solid fa-bag-shopping"></i><span class="badge-dot" id="cart-count">0</span></button>
        <button class="nav-action-btn" id="profile-nav-btn" data-href="profile.html"><i class="fa-regular fa-circle-user"></i></button>
        <button class="theme-toggle" id="theme-toggle"><div class="theme-toggle-thumb">🌙</div></button>
        <button class="nav-hamburger" id="nav-hamburger"><span></span><span></span><span></span></button>
      </div>
    </div>
  </nav>

  <main style="padding-top:calc(var(--nav-h) + var(--space-2xl));padding-bottom:var(--space-4xl);min-height:100vh">
    <div class="container">
      <div class="breadcrumb" style="margin-bottom:1.5rem">
        <a href="index.html">Home</a><span class="sep">/</span>
        <span class="current">Wishlist</span>
      </div>

      <h1 style="font-family:var(--font-display);font-size:var(--fs-4xl);font-weight:800;background:linear-gradient(135deg,var(--text-primary),var(--c-oak));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:2rem">
        My Wishlist <span id="wishlist-badge" style="font-size:var(--fs-xl);color:var(--text-muted)"></span>
      </h1>

      <div id="empty-wishlist" style="text-align:center;padding:6rem 2rem;display:none">
        <div style="font-size:5rem;margin-bottom:1.5rem">🤍</div>
        <h2 style="font-family:var(--font-display);font-size:var(--fs-3xl);color:var(--text-primary);margin-bottom:0.75rem">Your wishlist is empty</h2>
        <p style="color:var(--text-muted);margin-bottom:2rem">Save items you love and buy them later.</p>
        <a href="products.html" class="btn btn-primary btn-lg">Browse Products</a>
      </div>

      <div class="product-grid" id="wishlist-grid"></div>
    </div>
  </main>

  <div id="toast-container"></div>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/main.js"></script>
  <script src="js/home.js"></script>
  <script src="js/wishlist.js"></script>
</body>
</html>
